<!-- Character Page Content -->
<div id="character-page-content">
    <h2 class="text-3xl font-bold text-[#402E32] mb-4 border-b-2 border-[#A67B5B] pb-2"
        style="font-family: 'Cinzel', serif;">
        Personaggio: <span id="page-profile-name" class="text-[#6F4E37]"></span>
    </h2>

    <div id="character-tabs" class="flex border-b border-[#A67B5B] mb-6">
        <button class="tab-button active px-4 py-2 font-semibold text-[#6F4E37] border-b-2 border-[#A67B5B]"
            data-tab="tab-stats">Statistiche</button>
        <button class="tab-button px-4 py-2 font-semibold text-[#6F4E37]" data-tab="tab-inventory">Inventario</button>
        <button class="tab-button px-4 py-2 font-semibold text-[#6F4E37]" data-tab="tab-resources">Risorse</button>
    </div>

    <div id="character-tab-content" class="space-y-6">
        <div class="tab-pane active" id="tab-stats">
            <!-- Barre Biotiche -->
            <div id="biotic-output" class="grid grid-cols-3 gap-3 mb-6"></div>

            <!-- Statistiche d20 -->
            <div id="stat-output" class="grid grid-cols-3 gap-3 mb-6"></div>

            <h3 class="text-xl font-semibold text-[#402E32] mb-4" style="font-family: 'Cinzel', serif;">Livelli di
                Mestiere e Azioni</h3>
            <div id="action-message" class="hidden mt-3 p-2 rounded mb-4"></div>
            <div id="skill-output" class="space-y-3">
            </div>
        </div>

        <div class="tab-pane hidden" id="tab-inventory">
            <div>
                <h3 class="text-xl font-semibold text-[#402E32] mb-4" style="font-family: 'Cinzel', serif;">
                    Equipaggiamento Attuale</h3>
                <div id="equipment-output" class="space-y-3 mb-6">
                </div>
            </div>

            <div>
                <h3 class="text-xl font-semibold text-[#402E32] mb-4" style="font-family: 'Cinzel', serif;">Inventario
                    (Click per Equipaggiare)</h3>
                <div id="inventory-output" class="space-y-3 mb-6">
                </div>
            </div>
        </div>

        <div class="tab-pane hidden" id="tab-resources">
            <div>
                <h3 class="text-xl font-semibold text-[#402E32] mb-4" style="font-family: 'Cinzel', serif;">Risorse
                    Grezze</h3>
                <div id="resources-output" class="space-y-3 mb-6">
                </div>
            </div>
        </div>
    </div>
</div>
